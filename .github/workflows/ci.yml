name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Test (unit only)
        env:
          AWS_REGION: ap-northeast-1
        run: |
          python -m pytest -n 2 -q tests/unit --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=85

  integration:
    runs-on: ubuntu-latest
    needs: unit
    # main ブランチに push されたときだけ integration を回す
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,integration]"

      - name: Test (integration)
        env:
          AWS_REGION: ap-northeast-1
        run: |
          python -m pytest -m integration -q